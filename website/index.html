<!DOCTYPE html>
<html>
<head>
    <title>OpsVision Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .dashboard {
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <h1>OpsVision Dashboard</h1>

        <p><b>Hostname:</b> <span id="hostname">Loading...</span></p>
        <p><b>Current Time:</b> <span id="current_time">Loading...</span></p>
        <p><b>CPU:</b> <span id="cpu">Loading...</span></p>
        <p><b>Uptime:</b> <span id="uptime">Loading...</span></p>
        <p><b>Memory Usage:</b> <span id="memory">Loading...</span></p>
        <p><b>Disk Usage:</b> <span id="disk">Loading...</span></p>
        <p><b>Docker Status:</b> <span id="docker">Loading...</span></p>
        <p><b>Nginx Status:</b> <span id="nginx">Loading...</span></p>

    </div>

    <script>

        fetch('data/metrics.json')
            .then(response => response.json())
            .then(data => {

                document.getElementById('hostname').textContent = data.hostname;
                document.getElementById('current_time').textContent = data.current_time;
                document.getElementById('uptime').textContent = data.uptime;
                document.getElementById('cpu').textContent = data.cpu;
                document.getElementById('memory').textContent = data.memory;
                document.getElementById('disk').textContent = data.disk;
                document.getElementById('docker').textContent = data.docker;
                document.getElementById('nginx').textContent = data.nginx;

            })
            .catch(error => {
                console.error('Error loading metrics:', error);
            });

    </script>

</body>
</html>
